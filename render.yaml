services:
  # Django Web Service
  - type: web
    name: cryptosight-web
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r Django/requirements.txt && cd Django && python manage.py collectstatic --noinput
    startCommand: cd Django && chmod +x start.sh && ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: USD_TO_INR
        value: "83.50"
      - key: DATABASE_URL
        fromDatabase:
          name: cryptosight-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cryptosight-redis
          property: connectionString

  # Redis Service for Celery
  - type: redis
    name: cryptosight-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow internal Render services

databases:
  # PostgreSQL Database
  - name: cryptosight-db
    plan: free
    databaseName: cryptosight
    user: cryptosight_user